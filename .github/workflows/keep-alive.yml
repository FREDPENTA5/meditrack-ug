name: Keep Services Alive

on:
  schedule:
    # Runs every 3 days at midnight UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://igwyvttaqhwhtcrsrhnu.supabase.co/rest/v1/ || true
      
      - name: Ping Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://meditrack-ug.onrender.com || true

      - name: Ping Vercel (Frontend)
        # We ping the Render backend, but if Vercel has a separate frontend URL, add it here.
        # Replace the URL below with your actual Vercel project URL.
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://your-vercel-frontend.vercel.app || true
