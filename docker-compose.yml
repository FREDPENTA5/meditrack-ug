services:
  postgres:
    image: postgres:15-alpine
    container_name: meditrack-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meditrack_ug
    volumes:
      - meditrack_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d meditrack_ug']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: meditrack-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - meditrack_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meditrack_pg_data:
  meditrack_redis_data:
